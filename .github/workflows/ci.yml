name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run client tests
        run: npm run -w client test

      - name: Run server tests
        run: npm run -w server test

      - name: Build client (production)
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway (main only)
        if: github.ref == 'refs/heads/main'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          set -e
          npx railway login --apiKey "$RAILWAY_TOKEN"
          # Link project (no-op if already linked)
          npx railway link --projectId "$RAILWAY_PROJECT_ID" || true
          # Deploy the application
          npx railway up --projectId "$RAILWAY_PROJECT_ID" --detach
